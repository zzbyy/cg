# governance/triggers.yaml
# When each pipeline stage fires.

constructor:
  trigger: session_start
  always_load:
    - human/non-negotiables.md
    - human/preferences.yaml
    - global/identity.md
    - global/principles.md
    - registry.yaml
  after_load:
    - write: scratchpad/manifest.md
    - action: present_and_confirm

monitor:
  triggers:
    - signal: decision_made
      action: prompt_stage_to_inbox
    - signal: pattern_or_lesson
      action: prompt_stage_to_inbox
    - signal: cross_domain_insight
      action: prompt_immediately
    - signal: session_length_40_messages
      action: write_checkpoint_and_alert
    - signal: context_degrading
      action: write_checkpoint_and_alert
    - signal: recovery_phrase
      phrases: [restart, "new session", "start fresh", "lost the thread",
                "compact this", "too long", "going in circles", checkpoint]
      action: write_checkpoint_instantly

evaluator:
  trigger: session_end_detected
  actions:
    - surface_decisions
    - surface_memory_updates
    - surface_cross_pollination
    - ask_history_granularity
    - ask_scratchpad_disposition
    - propose_commit

write_back:
  staging: inbox/
  approval_required: true
  auto_merge: false
